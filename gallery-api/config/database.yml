default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST") { "localhost" } %>
  port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "gallery_api_development" } %>
  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "gallery_api_development" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB") { "gallery_api_development" } %>
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: gallery_api_test

production:
  primary: &primary_production
    <<: *default
    database: gallery_api_production
    username: gallery_api
    password: <%= ENV["GALLERY_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: gallery_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: gallery_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: gallery_api_production_cable
    migrations_paths: db/cable_migrate
