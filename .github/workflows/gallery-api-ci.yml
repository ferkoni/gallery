name: CI

on:
  pull_request:
    paths:
      - 'gallery-api/**'
  push:
    branches: [main]
    paths:
      - 'gallery-api/**'

defaults:
  run:
    working-directory: gallery-api

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: gallery-api

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: gallery-api

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('gallery-api/.ruby-version', 'gallery-api/**/.rubocop.yml', 'gallery-api/**/.rubocop_todo.yml', 'gallery-api/Gemfile.lock') }}
        with:
          path: gallery-api/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: gallery-api

      - name: Set up database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: SXfQ7DCcBD8Sqsav4DPVlxb3Rr7bvCrD
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: nzMgfs3mYOtaITTmgLzwviWaMd9kPYbn
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: AGLY8rjLJeBM7hiKIFYT3MZqTuILAhge
        run: bin/rails db:test:prepare

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: SXfQ7DCcBD8Sqsav4DPVlxb3Rr7bvCrD
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: nzMgfs3mYOtaITTmgLzwviWaMd9kPYbn
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: AGLY8rjLJeBM7hiKIFYT3MZqTuILAhge
        run: bundle exec rspec

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: gallery-api/coverage/
          if-no-files-found: error
