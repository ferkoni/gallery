name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gallery-api
        uses: docker/build-push-action@v6
        with:
          context: gallery-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gallery-api:${{ github.ref_name }}

      - name: Build and push gallery-nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gallery-nginx:${{ github.ref_name }}

      - name: Prepare release artifacts
        env:
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p /tmp/release
          sed \
            -e "s|\${GHCR_OWNER}|${OWNER}|g" \
            -e "s|\${VERSION}|${TAG}|g" \
            docker-compose.yml > /tmp/release/docker-compose.yml
          sed \
            -e "s|OWNER_PLACEHOLDER|${OWNER}|g" \
            install.sh > /tmp/release/install.sh
          chmod +x /tmp/release/install.sh
          cp setup.sh /tmp/release/setup.sh
          chmod +x /tmp/release/setup.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            /tmp/release/docker-compose.yml \
            /tmp/release/install.sh \
            /tmp/release/setup.sh
